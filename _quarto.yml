project:
  type: website
  output-dir: docs
  preview:
    port: 4321
    browser: true

website:
  title: "WITS Old Mutual Insure Risk Lab"
  favicon: images/logo.png
  image: images/logo.png
  open-graph: true
  twitter-card: true
  navbar:
    logo: images/logo.png
    title: false
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Research"
        href: research.qmd
      - text: "Team"
        href: team.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: github
        href: https://github.com/odeymofokeng-wits/wits-riks-lab
        aria-label: GitHub
  page-footer:
    left: |
      &copy; 2026 WITS Old Mutual Insure Risk Lab. All rights reserved.
      School of  Actuarial Science & Statistics, University of the Witwatersrand
    right: |
      Built with [Quarto](https://quarto.org/)
    background: dark

format:
  html:
    theme:
      light: flatly
    css: styles.css
    toc: false
    code-link: true
    anchor-sections: true
    smooth-scroll: true
    grid:
      sidebar-width: 0px
      body-width: 1200px
      margin-width: 300px
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    google-analytics: ""